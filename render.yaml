services:
  - type: web
    name: buildwise-ai-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: authority-documents
      - key: ADMIN_API_KEY
        generateValue: true
      - key: EMBEDDING_PROVIDER
        value: sentence-transformers
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: EMBEDDING_DIMENSIONS
        value: "384"
      - key: LLM_PROVIDER
        value: local
